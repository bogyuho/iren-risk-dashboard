<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IREN 실행리스크</title>
  <meta name="theme-color" content="#050505">
  <meta name="description" content="IREN 실행리스크 추적 대시보드">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink: #171717;
      --soft-ink: #303435;
      --muted: #687071;
      --paper: #f4f6f2;
      --surface: #ffffff;
      --line: #d7ded7;
      --green: #159a68;
      --cyan: #087ea4;
      --yellow: #d2a11f;
      --red: #cf3f3f;
      --shadow: 0 10px 28px rgba(27, 38, 34, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
      line-height: 1.5;
    }

    a {
      color: var(--cyan);
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    h1,
    h2,
    h3,
    p {
      overflow-wrap: anywhere;
    }

    h1 {
      margin: 8px 0 10px;
      font-size: 34px;
      line-height: 1.08;
    }

    h2 {
      margin: 28px 0 12px;
      font-size: 20px;
      line-height: 1.25;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.28;
    }

    p {
      margin: 0;
    }

    .wrap {
      width: min(100%, 1060px);
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.76);
      padding: 4px 9px;
    }

    .command {
      display: grid;
      grid-template-columns: minmax(310px, 0.94fr) minmax(0, 1.06fr);
      gap: 14px;
      align-items: stretch;
      padding-top: 12px;
    }

    .panel,
    .risk,
    .note,
    .install,
    .source {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .growth {
      padding: 14px;
      border-color: #b9d8c8;
    }

    .growth-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .growth-head > * {
      min-width: 0;
    }

    .kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .score {
      margin-top: 4px;
      font-size: 58px;
      font-weight: 850;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .score small {
      color: var(--muted);
      font-size: 20px;
      font-weight: 750;
    }

    .stage {
      max-width: 155px;
      color: var(--soft-ink);
      text-align: right;
      font-weight: 800;
      line-height: 1.24;
      overflow-wrap: anywhere;
    }

    .tree-wrap {
      width: min(100%, 260px);
      margin: 4px auto 0;
    }

    .tree-wrap svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .tree-trunk,
    .tree-branch {
      fill: none;
      stroke: #66503a;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tree-trunk {
      stroke-width: 18;
    }

    .tree-branch {
      stroke-width: 11;
    }

    .tree-ground {
      fill: #dcefe7;
    }

    .tree-root {
      fill: none;
      stroke: #7a654d;
      stroke-width: 7;
      stroke-linecap: round;
    }

    .tree-leaf {
      fill: var(--green);
    }

    .tree-leaf.pending {
      fill: #d9dee3;
      stroke: #b8c0c7;
      stroke-width: 2;
    }

    .tree-fruit {
      fill: var(--red);
    }

    .progress {
      height: 12px;
      margin: 10px 0 12px;
      overflow: hidden;
      border-radius: 8px;
      background: #e6ece7;
    }

    .progress i {
      display: block;
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      min-width: 0;
    }

    .quick div,
    .phase div {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      padding: 10px;
    }

    .quick b,
    .quick span,
    .phase b,
    .phase span {
      display: block;
      overflow-wrap: anywhere;
    }

    .quick b,
    .phase b {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .quick span,
    .phase span {
      margin-top: 2px;
      font-weight: 800;
      line-height: 1.26;
    }

    .summary {
      padding: 16px;
    }

    .lead {
      max-width: 680px;
      color: var(--soft-ink);
      font-size: 16px;
      font-weight: 650;
    }

    .stamp {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .metric {
      min-height: 80px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      padding: 11px;
    }

    .metric b,
    .metric span {
      display: block;
      overflow-wrap: anywhere;
    }

    .metric b {
      font-size: 18px;
      line-height: 1.2;
    }

    .metric span {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .phase {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .tone-green {
      border-left: 5px solid var(--green) !important;
    }

    .tone-cyan {
      border-left: 5px solid var(--cyan) !important;
    }

    .tone-yellow {
      border-left: 5px solid var(--yellow) !important;
    }

    .tone-red {
      border-left: 5px solid var(--red) !important;
    }

    .evidence {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .evidence img {
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #e8eceb;
    }

    .risk-map {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .risk-strip {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 14px;
    }

    .strip-bar {
      display: flex;
      height: 15px;
      overflow: hidden;
      border-radius: 8px;
      background: #e7ece9;
    }

    .strip-bar i {
      display: block;
      height: 100%;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .legend i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .risk-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .risk {
      padding: 13px;
    }

    .risk-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .status {
      flex: 0 0 auto;
      border-radius: 8px;
      background: #f2f4f3;
      padding: 4px 8px;
      color: var(--soft-ink);
      font-size: 12px;
      font-weight: 850;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 8px;
      background: #e8edf2;
      margin: 12px 0 9px;
    }

    .bar i {
      display: block;
      height: 100%;
      border-radius: 8px;
      background: var(--yellow);
    }

    .bar .greenbar {
      background: var(--green);
    }

    .bar .redbar {
      background: var(--red);
    }

    .bar .cyanbar {
      background: var(--cyan);
    }

    .risk p {
      color: var(--muted);
      font-size: 14px;
    }

    .risk-next {
      margin-top: 10px;
      padding-top: 9px;
      border-top: 1px solid var(--line);
      color: var(--soft-ink) !important;
      font-weight: 650;
    }

    .watch {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .watch li {
      border: 1px solid var(--line);
      border-left: 5px solid var(--cyan);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 12px 14px;
      font-weight: 700;
    }

    .note,
    .install,
    .source {
      padding: 14px;
    }

    .install {
      display: grid;
      gap: 10px;
    }

    .install button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      padding: 12px 14px;
      font: inherit;
      font-weight: 800;
    }

    .install button:disabled {
      background: #9ba3a2;
    }

    .install ol {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
    }

    .sources {
      display: grid;
      gap: 10px;
    }

    .source {
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    @media (max-width: 780px) {
      .wrap {
        padding: 13px;
      }

      .topbar {
        align-items: flex-start;
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .command,
      .risk-grid {
        grid-template-columns: 1fr;
      }

      .growth {
        order: -1;
      }

      h1 {
        font-size: 29px;
      }

      .score {
        font-size: 52px;
      }

      .stage {
        text-align: left;
        max-width: none;
        font-size: 13px;
      }

      .growth-head {
        display: grid;
        grid-template-columns: 1fr;
      }

      .tree-wrap {
        max-width: 210px;
      }

      .metric-row {
        grid-template-columns: repeat(3, 1fr);
      }

      .metric {
        min-height: 70px;
        padding: 9px;
      }

      .metric b {
        font-size: 13px;
      }

      .metric span {
        font-size: 11px;
      }

      .phase,
      .evidence {
        grid-template-columns: repeat(2, 1fr);
      }

      .quick {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="./theme.css">
</head>
<body>
  <header class="wrap">
    <div class="topbar">
      <span class="pill">IREN Execution</span>
      <span id="stamp"></span>
    </div>
    <div class="command">
      <section class="panel growth" aria-label="실행 성숙도">
        <div class="growth-head">
          <div>
            <p class="kicker" id="treeLabel"></p>
            <div class="score"><span id="treeScore">0</span><small>%</small></div>
          </div>
          <p class="stage" id="treeStage"></p>
        </div>
        <div class="tree-wrap" id="treeVisual"></div>
        <div class="progress"><i id="treeProgress"></i></div>
        <div class="quick">
          <div><b>병목</b><span id="treeBlocker"></span></div>
          <div><b>다음 확인</b><span id="treeNextEvent"></span></div>
        </div>
        <div class="phase" id="treeChecks"></div>
      </section>

      <section class="panel summary">
        <p class="kicker">현재 판정</p>
        <h1 id="title">IREN 실행리스크</h1>
        <p id="lead" class="lead"></p>
        <div id="metrics" class="metric-row"></div>
        <div class="risk-strip">
          <div id="riskStrip" class="strip-bar"></div>
          <div id="riskLegend" class="legend"></div>
        </div>
        <div class="evidence">
          <img id="heroImage" alt="IREN Childress data center">
          <img id="secondaryImage" alt="IREN Sweetwater substation">
        </div>
      </section>
    </div>
  </header>

  <main class="wrap">
    <section>
      <h2>핵심 결론</h2>
      <div class="note">
        <p id="thesis"></p>
      </div>
    </section>

    <section>
      <h2>10단계 신뢰도 루프</h2>
      <div id="auditLoop" class="audit-grid"></div>
    </section>

    <section>
      <h2>리스크 보드</h2>
      <div id="risks" class="risk-grid"></div>
    </section>

    <section>
      <h2>다음 체크포인트</h2>
      <ul id="watchlist" class="watch"></ul>
    </section>

    <section>
      <h2>홈화면 추가</h2>
      <div class="install">
        <p id="installMessage">브라우저 메뉴에서 홈화면에 추가할 수 있다.</p>
        <button id="installButton" type="button">홈화면에 추가</button>
        <ol id="installSteps"></ol>
      </div>
    </section>

    <section>
      <h2>출처</h2>
      <div id="sources" class="sources"></div>
    </section>
  </main>

  <script src="./risk-data.js"></script>
  <script>
    const data = window.IREN_RISK_DATA;
    let deferredInstallPrompt = null;

    function text(id, value) {
      document.getElementById(id).textContent = value;
    }

    function barClass(tone) {
      if (tone === "green") return "greenbar";
      if (tone === "red") return "redbar";
      if (tone === "cyan") return "cyanbar";
      return "";
    }

    function toneColor(tone) {
      if (tone === "green") return "var(--green)";
      if (tone === "cyan") return "var(--cyan)";
      if (tone === "red") return "var(--red)";
      return "var(--yellow)";
    }

    function treeSvg(progress) {
      const level = Math.max(0, Math.min(100, progress));
      const trunkHeight = 98 + Math.round(level * 0.82);
      const topY = 305 - trunkHeight;
      const branchOpacity = level >= 35 ? 1 : 0.35;
      const leafOpacity = level >= 50 ? 1 : 0.28;
      const fruitOpacity = level >= 78 ? 1 : 0.18;
      const pendingOpacity = level >= 78 ? 0.25 : 0.9;

      return `
        <svg viewBox="0 0 360 340" role="img" aria-label="IREN execution tree">
          <ellipse class="tree-ground" cx="180" cy="305" rx="128" ry="24"></ellipse>
          <path class="tree-root" d="M178 300 C146 310, 126 313, 98 307"></path>
          <path class="tree-root" d="M184 300 C214 312, 239 315, 267 307"></path>
          <path class="tree-root" d="M181 300 C174 315, 164 324, 143 328"></path>
          <path class="tree-trunk" d="M180 300 C176 254, 181 215, 180 ${topY}"></path>
          <g style="opacity:${branchOpacity}">
            <path class="tree-branch" d="M181 ${topY + 22} C144 ${topY + 3}, 126 ${topY - 16}, 108 ${topY - 42}"></path>
            <path class="tree-branch" d="M182 ${topY + 8} C218 ${topY - 5}, 239 ${topY - 28}, 256 ${topY - 54}"></path>
            <path class="tree-branch" d="M180 ${topY + 44} C210 ${topY + 37}, 232 ${topY + 26}, 264 ${topY + 12}"></path>
          </g>
          <g style="opacity:${leafOpacity}">
            <circle class="tree-leaf" cx="103" cy="${topY - 48}" r="24"></circle>
            <circle class="tree-leaf" cx="133" cy="${topY - 28}" r="22"></circle>
            <circle class="tree-leaf" cx="251" cy="${topY - 60}" r="27"></circle>
            <circle class="tree-leaf" cx="278" cy="${topY - 33}" r="21"></circle>
            <circle class="tree-leaf" cx="270" cy="${topY + 12}" r="22"></circle>
          </g>
          <g style="opacity:${pendingOpacity}">
            <circle class="tree-leaf pending" cx="158" cy="${topY - 58}" r="22"></circle>
            <circle class="tree-leaf pending" cx="222" cy="${topY - 88}" r="19"></circle>
            <circle class="tree-leaf pending" cx="302" cy="${topY - 4}" r="16"></circle>
          </g>
          <g style="opacity:${fruitOpacity}">
            <circle class="tree-fruit" cx="246" cy="${topY - 43}" r="7"></circle>
            <circle class="tree-fruit" cx="124" cy="${topY - 43}" r="7"></circle>
            <circle class="tree-fruit" cx="274" cy="${topY + 2}" r="7"></circle>
          </g>
        </svg>
      `;
    }

    document.title = data.title;
    document.getElementById("heroImage").src = data.heroImage;
    document.getElementById("secondaryImage").src = data.secondaryImage;
    text("title", data.title);
    text("lead", data.verdict);
    text("stamp", data.updatedAt);
    text("thesis", data.thesis);

    document.getElementById("metrics").innerHTML = data.summaryMetrics
      .map((item) => `<div class="metric"><b>${item.value}</b><span>${item.label}</span></div>`)
      .join("");

    document.getElementById("treeLabel").textContent = data.executionTree.label;
    document.getElementById("treeScore").textContent = data.executionTree.progress;
    document.getElementById("treeStage").textContent = data.executionTree.stage;
    document.getElementById("treeBlocker").textContent = data.executionTree.blocker;
    document.getElementById("treeNextEvent").textContent = data.executionTree.nextEvent;
    document.getElementById("treeProgress").style.width = `${data.executionTree.progress}%`;
    document.getElementById("treeVisual").innerHTML = treeSvg(data.executionTree.progress);
    document.getElementById("treeChecks").innerHTML = data.executionTree.checkpoints
      .map((item) => `
        <div class="tone-${item.tone}">
          <b>${item.label}</b>
          <span>${item.status}</span>
        </div>
      `)
      .join("");

    const counts = data.risks.reduce((acc, risk) => {
      acc[risk.tone] = (acc[risk.tone] || 0) + 1;
      return acc;
    }, {});
    const total = data.risks.length;
    const order = [
      ["green", "개선"],
      ["cyan", "진행"],
      ["yellow", "검증대기"],
      ["red", "병목"]
    ];
    document.getElementById("riskStrip").innerHTML = order
      .map(([tone]) => `<i style="width:${((counts[tone] || 0) / total) * 100}%; background:${toneColor(tone)}"></i>`)
      .join("");
    document.getElementById("riskLegend").innerHTML = order
      .filter(([tone]) => counts[tone])
      .map(([tone, label]) => `<span><i style="background:${toneColor(tone)}"></i>${label} ${counts[tone]}</span>`)
      .join("");

    document.getElementById("risks").innerHTML = data.risks
      .map((risk) => `
        <article class="risk tone-${risk.tone}">
          <div class="risk-head">
            <h3>${risk.title}</h3>
            <span class="status">${risk.status}</span>
          </div>
          <div class="risk-meta">
            <span>신뢰도 ${risk.confidence || "검증중"}</span>
            <span>${risk.evidence || "근거 보강중"}</span>
          </div>
          <div class="bar"><i class="${barClass(risk.tone)}" style="width: ${risk.score}%"></i></div>
          <p>${risk.why}</p>
          <p class="risk-next">${risk.next}</p>
        </article>
      `)
      .join("");

    document.getElementById("auditLoop").innerHTML = (data.auditLoop || [])
      .map((item) => `
        <article class="audit tone-${item.tone}">
          <b>${item.step}</b>
          <p>${item.result}</p>
          <span>신뢰도 ${item.confidence}</span>
        </article>
      `)
      .join("");

    document.getElementById("watchlist").innerHTML = data.watchlist
      .map((item, index) => `<li>${index + 1}. ${item}</li>`)
      .join("");

    document.getElementById("sources").innerHTML = data.sources
      .map((source) => `<div class="source"><a href="${source.url}">${source.label}</a></div>`)
      .join("");

    const installButton = document.getElementById("installButton");
    const installMessage = document.getElementById("installMessage");
    const installSteps = document.getElementById("installSteps");
    const userAgent = navigator.userAgent || "";
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

    function setInstallSteps(steps) {
      installSteps.innerHTML = steps.map((step) => `<li>${step}</li>`).join("");
    }

    if (isStandalone) {
      installMessage.textContent = "이미 홈화면 앱 모드로 열려 있다.";
      installButton.disabled = true;
      installButton.textContent = "추가 완료";
      setInstallSteps([]);
    } else if (isIOS) {
      installMessage.textContent = "iPhone/iPad는 Safari 공유 메뉴에서 추가한다.";
      installButton.textContent = "아래 순서로 추가";
      installButton.disabled = true;
      setInstallSteps(["Safari 하단 공유 버튼", "\"홈 화면에 추가\"", "추가"]);
    } else {
      installMessage.textContent = "Chrome/Edge에서 설치 조건이 충족되면 버튼이 활성화된다.";
      installButton.disabled = true;
      installButton.textContent = "설치 준비 중";
      setInstallSteps(["브라우저 메뉴", "\"앱 설치\" 또는 \"홈 화면에 추가\""]);
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton.disabled = false;
      installButton.textContent = "홈화면에 추가";
      installMessage.textContent = "설치할 준비가 됐다.";
    });

    installButton.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.disabled = true;
      installButton.textContent = "추가 요청 완료";
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
