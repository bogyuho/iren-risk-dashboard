<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IREN 실행리스크</title>
  <meta name="theme-color" content="#181818">
  <meta name="description" content="IREN 실행리스크 추적 대시보드">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink: #181818;
      --muted: #5d646b;
      --line: #d8dee4;
      --paper: #f6f8fa;
      --white: #ffffff;
      --green: #159a68;
      --cyan: #087ea4;
      --yellow: #d4a017;
      --red: #cf3f3f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, #edf5f0 0, #f6f8fa 270px, #f6f8fa 100%);
      color: var(--ink);
      letter-spacing: 0;
      line-height: 1.55;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    a {
      color: var(--cyan);
      text-decoration: none;
    }

    h1,
    h2,
    h3,
    p {
      overflow-wrap: anywhere;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
    }

    h2 {
      margin: 28px 0 12px;
      font-size: 21px;
      line-height: 1.25;
    }

    h3 {
      margin: 0 0 8px;
      font-size: 17px;
      line-height: 1.3;
    }

    p {
      margin: 0 0 10px;
    }

    .wrap {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 16px;
    }

    .hero {
      background: transparent;
      border-bottom: 1px solid var(--line);
    }

    .image-shell {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(24, 24, 24, 0.12);
      background: #181818;
    }

    .hero img {
      max-height: 170px;
      object-fit: cover;
      opacity: 0.86;
    }

    .image-copy {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      color: #ffffff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .image-copy b,
    .image-copy span {
      display: block;
      overflow-wrap: anywhere;
    }

    .image-copy b {
      font-size: 22px;
      line-height: 1.12;
    }

    .image-copy span {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 700;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(0, 1.1fr);
      gap: 18px;
      align-items: stretch;
      margin-top: 14px;
    }

    .lead {
      color: var(--muted);
      font-size: 15px;
    }

    .stamp {
      color: var(--muted);
      font-size: 14px;
      margin-top: 12px;
    }

    .scoreline {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .metric,
    .risk,
    .note,
    .install,
    .tree-panel,
    .source {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(24, 24, 24, 0.05);
    }

    .metric b {
      display: block;
      font-size: 21px;
    }

    .metric span,
    .risk span {
      color: var(--muted);
      font-size: 14px;
    }

    .metric {
      min-height: 76px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric b {
      font-size: 18px;
    }

    .risk h3 {
      min-height: 44px;
    }

    .risk .risk-next {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .risk .risk-next b {
      display: block;
      margin-bottom: 3px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .hero-note {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(24, 24, 24, 0.05);
    }

    .hero-note b {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .hero-note p {
      margin: 0;
      font-weight: 650;
    }

    .signal {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .desktop-title {
      margin-top: 4px;
    }

    .tree-panel {
      display: grid;
      gap: 11px;
      min-height: 100%;
      border-color: #b7d7c9;
      background: #fbfdfb;
    }

    .tree-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .tree-score {
      font-size: 48px;
      font-weight: 800;
      line-height: 1;
    }

    .tree-score small {
      color: var(--muted);
      font-size: 17px;
    }

    .tree-stage {
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .tree-visual {
      width: 100%;
      max-width: 270px;
      margin: 0 auto;
    }

    .tree-visual svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .tree-trunk,
    .tree-branch {
      fill: none;
      stroke: #66503a;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tree-trunk {
      stroke-width: 18;
    }

    .tree-branch {
      stroke-width: 11;
    }

    .tree-ground {
      fill: #dcefe7;
    }

    .tree-root {
      fill: none;
      stroke: #7a654d;
      stroke-width: 7;
      stroke-linecap: round;
    }

    .tree-leaf {
      fill: var(--green);
    }

    .tree-leaf.pending {
      fill: #d9dee3;
      stroke: #b8c0c7;
      stroke-width: 2;
    }

    .tree-fruit {
      fill: var(--red);
    }

    .tree-progress {
      height: 11px;
      overflow: hidden;
      background: #e8edf2;
      border-radius: 8px;
    }

    .tree-progress i {
      display: block;
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
    }

    .tree-checks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .quick-read {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .quick-read div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      min-width: 0;
    }

    .quick-read b,
    .quick-read span {
      display: block;
      overflow-wrap: anywhere;
    }

    .quick-read b {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .quick-read span {
      margin-top: 2px;
      font-weight: 750;
      line-height: 1.28;
    }

    .tree-check {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fbfcfd;
      min-width: 0;
    }

    .tree-check b,
    .tree-check span {
      display: block;
      overflow-wrap: anywhere;
    }

    .tree-check b {
      font-size: 13px;
    }

    .tree-check span {
      color: var(--muted);
      font-size: 12px;
    }

    .tone-green {
      border-left: 5px solid var(--green);
    }

    .tone-cyan {
      border-left: 5px solid var(--cyan);
    }

    .tone-yellow {
      border-left: 5px solid var(--yellow);
    }

    .tone-red {
      border-left: 5px solid var(--red);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 9px;
      border-radius: 8px;
      color: #111111;
      background: #f3f4f6;
      font-weight: 700;
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--yellow);
    }

    .green .dot {
      background: var(--green);
    }

    .red .dot {
      background: var(--red);
    }

    .cyan .dot {
      background: var(--cyan);
    }

    .bar {
      height: 9px;
      overflow: hidden;
      background: #e8edf2;
      border-radius: 8px;
      margin: 12px 0 8px;
    }

    .bar i {
      display: block;
      height: 100%;
      border-radius: 8px;
      background: var(--yellow);
    }

    .bar .greenbar {
      background: var(--green);
    }

    .bar .redbar {
      background: var(--red);
    }

    .bar .cyanbar {
      background: var(--cyan);
    }

    .watch {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .watch li {
      background: var(--white);
      border: 1px solid var(--line);
      border-left: 5px solid var(--cyan);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .sources {
      display: grid;
      gap: 10px;
    }

    .source {
      overflow-wrap: anywhere;
      font-size: 14px;
    }

    .install {
      display: grid;
      gap: 10px;
    }

    .install button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--ink);
      color: var(--white);
      padding: 12px 14px;
      font: inherit;
      font-weight: 700;
    }

    .install button:disabled {
      background: #9aa1a8;
    }

    .install ol {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
    }

    .install li {
      margin: 4px 0;
    }

    @media (max-width: 720px) {
      .wrap {
        padding: 14px;
      }

      h1 {
        font-size: 28px;
      }

      .hero-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .scoreline {
        grid-template-columns: repeat(3, 1fr);
        gap: 7px;
      }

      .metric {
        min-height: 68px;
        padding: 10px;
      }

      .metric b {
        font-size: 14px;
      }

      .metric span {
        font-size: 12px;
      }

      .tree-score {
        font-size: 44px;
      }

      .tree-stage {
        text-align: left;
      }

      .tree-top {
        flex-direction: column;
      }

      .tree-checks {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero img {
        max-height: 118px;
      }

      .tree-visual {
        max-width: 220px;
      }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="image-shell">
      <img id="heroImage" alt="IREN Childress data center">
      <div class="image-copy">
        <b>IREN 실행리스크</b>
        <span>공사 진행, Microsoft acceptance 전</span>
      </div>
    </div>
    <div class="wrap">
      <div class="hero-grid">
        <section class="tree-panel" aria-label="실행 성숙도">
          <div class="tree-top">
            <div>
              <p class="stamp" id="treeLabel"></p>
              <div class="tree-score"><span id="treeScore">0</span><small>%</small></div>
            </div>
            <p class="tree-stage" id="treeStage"></p>
          </div>
          <div class="tree-visual" id="treeVisual"></div>
          <div class="tree-progress"><i id="treeProgress"></i></div>
          <div class="quick-read">
            <div><b>병목</b><span id="treeBlocker"></span></div>
            <div><b>다음 확인</b><span id="treeNextEvent"></span></div>
          </div>
          <p class="lead" id="treeInterpretation"></p>
          <div class="tree-checks" id="treeChecks"></div>
        </section>
        <div>
          <p class="signal">실행상태 먼저 보고, 세부 리스크는 아래에서 확인</p>
          <h1 id="title" class="desktop-title">IREN 실행리스크</h1>
          <p id="lead" class="lead"></p>
          <p id="stamp" class="stamp"></p>
          <div id="metrics" class="scoreline"></div>
          <div class="hero-note">
            <b>현재 해석</b>
            <p id="heroThesis"></p>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section>
      <h2>핵심 결론</h2>
      <div class="note">
        <p id="thesis"></p>
      </div>
    </section>

    <section>
      <h2>리스크 보드</h2>
      <div id="risks" class="grid"></div>
    </section>

    <section>
      <h2>다음 체크포인트</h2>
      <ul id="watchlist" class="watch"></ul>
    </section>

    <section>
      <h2>홈화면 추가</h2>
      <div class="install">
        <p id="installMessage">브라우저 메뉴에서 홈화면에 추가할 수 있다.</p>
        <button id="installButton" type="button">홈화면에 추가</button>
        <ol id="installSteps"></ol>
      </div>
    </section>

    <section>
      <h2>공식 이미지 기준</h2>
      <img id="secondaryImage" alt="IREN Sweetwater substation">
      <p class="stamp">공식 이미지는 공정률 판정 자료가 아니라 위치/자산 맥락 확인용이다.</p>
    </section>

    <section>
      <h2>출처</h2>
      <div id="sources" class="sources"></div>
    </section>
  </main>

  <script src="./risk-data.js"></script>
  <script>
    const data = window.IREN_RISK_DATA;
    let deferredInstallPrompt = null;

    function text(id, value) {
      document.getElementById(id).textContent = value;
    }

    function barClass(tone) {
      if (tone === "green") return "greenbar";
      if (tone === "red") return "redbar";
      if (tone === "cyan") return "cyanbar";
      return "";
    }

    function treeSvg(progress) {
      const level = Math.max(0, Math.min(100, progress));
      const trunkHeight = 96 + Math.round(level * 0.9);
      const topY = 305 - trunkHeight;
      const branchOpacity = level >= 35 ? 1 : 0.35;
      const leafOpacity = level >= 50 ? 1 : 0.28;
      const fruitOpacity = level >= 78 ? 1 : 0.18;
      const pendingOpacity = level >= 78 ? 0.25 : 0.9;

      return `
        <svg viewBox="0 0 360 340" role="img" aria-label="IREN execution tree">
          <ellipse class="tree-ground" cx="180" cy="305" rx="128" ry="24"></ellipse>
          <path class="tree-root" d="M178 300 C146 310, 126 313, 98 307"></path>
          <path class="tree-root" d="M184 300 C214 312, 239 315, 267 307"></path>
          <path class="tree-root" d="M181 300 C174 315, 164 324, 143 328"></path>
          <path class="tree-trunk" d="M180 300 C176 254, 181 215, 180 ${topY}"></path>
          <g style="opacity:${branchOpacity}">
            <path class="tree-branch" d="M181 ${topY + 22} C144 ${topY + 3}, 126 ${topY - 16}, 108 ${topY - 42}"></path>
            <path class="tree-branch" d="M182 ${topY + 8} C218 ${topY - 5}, 239 ${topY - 28}, 256 ${topY - 54}"></path>
            <path class="tree-branch" d="M180 ${topY + 44} C210 ${topY + 37}, 232 ${topY + 26}, 264 ${topY + 12}"></path>
          </g>
          <g style="opacity:${leafOpacity}">
            <circle class="tree-leaf" cx="103" cy="${topY - 48}" r="24"></circle>
            <circle class="tree-leaf" cx="133" cy="${topY - 28}" r="22"></circle>
            <circle class="tree-leaf" cx="251" cy="${topY - 60}" r="27"></circle>
            <circle class="tree-leaf" cx="278" cy="${topY - 33}" r="21"></circle>
            <circle class="tree-leaf" cx="270" cy="${topY + 12}" r="22"></circle>
          </g>
          <g style="opacity:${pendingOpacity}">
            <circle class="tree-leaf pending" cx="158" cy="${topY - 58}" r="22"></circle>
            <circle class="tree-leaf pending" cx="222" cy="${topY - 88}" r="19"></circle>
            <circle class="tree-leaf pending" cx="302" cy="${topY - 4}" r="16"></circle>
          </g>
          <g style="opacity:${fruitOpacity}">
            <circle class="tree-fruit" cx="246" cy="${topY - 43}" r="7"></circle>
            <circle class="tree-fruit" cx="124" cy="${topY - 43}" r="7"></circle>
            <circle class="tree-fruit" cx="274" cy="${topY + 2}" r="7"></circle>
          </g>
        </svg>
      `;
    }

    document.title = data.title;
    document.getElementById("heroImage").src = data.heroImage;
    document.getElementById("secondaryImage").src = data.secondaryImage;
    text("title", data.title);
    text("lead", `판정: ${data.verdict}`);
    text("stamp", `업데이트: ${data.updatedAt}`);
    text("thesis", data.thesis);
    text("heroThesis", data.thesis);

    document.getElementById("metrics").innerHTML = data.summaryMetrics
      .map((item) => `<div class="metric"><b>${item.value}</b><span>${item.label}</span></div>`)
      .join("");

    document.getElementById("treeLabel").textContent = data.executionTree.label;
    document.getElementById("treeScore").textContent = data.executionTree.progress;
    document.getElementById("treeStage").textContent = data.executionTree.stage;
    document.getElementById("treeBlocker").textContent = data.executionTree.blocker;
    document.getElementById("treeNextEvent").textContent = data.executionTree.nextEvent;
    document.getElementById("treeInterpretation").textContent = data.executionTree.interpretation;
    document.getElementById("treeProgress").style.width = `${data.executionTree.progress}%`;
    document.getElementById("treeVisual").innerHTML = treeSvg(data.executionTree.progress);
    document.getElementById("treeChecks").innerHTML = data.executionTree.checkpoints
      .map(
        (item) => `
          <div class="tree-check tone-${item.tone}">
            <b>${item.label}</b>
            <span>${item.status}</span>
          </div>
        `
      )
      .join("");

    document.getElementById("risks").innerHTML = data.risks
      .map(
        (risk) => `
          <article class="risk ${risk.tone}">
            <h3>${risk.title}</h3>
            <p class="status"><i class="dot"></i>${risk.status}</p>
            <div class="bar"><i class="${barClass(risk.tone)}" style="width: ${risk.score}%"></i></div>
            <span>${risk.why}</span>
            <p class="stamp risk-next"><b>다음 확인</b>${risk.next}</p>
          </article>
        `
      )
      .join("");

    document.getElementById("watchlist").innerHTML = data.watchlist
      .map((item, index) => `<li><b>${index + 1}. ${item}</b></li>`)
      .join("");

    document.getElementById("sources").innerHTML = data.sources
      .map((source) => `<div class="source"><a href="${source.url}">${source.label}</a></div>`)
      .join("");

    const installButton = document.getElementById("installButton");
    const installMessage = document.getElementById("installMessage");
    const installSteps = document.getElementById("installSteps");
    const userAgent = navigator.userAgent || "";
    const isIOS = /iPad|iPhone|iPod/.test(userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
    const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

    function setInstallSteps(steps) {
      installSteps.innerHTML = steps.map((step) => `<li>${step}</li>`).join("");
    }

    if (isStandalone) {
      installMessage.textContent = "이미 홈화면 앱 모드로 열려 있다.";
      installButton.disabled = true;
      installButton.textContent = "추가 완료";
      setInstallSteps([]);
    } else if (isIOS) {
      installMessage.textContent = "iPhone/iPad는 보안 제한 때문에 페이지 버튼으로 바로 설치할 수 없다.";
      installButton.textContent = "아래 순서로 추가";
      installButton.disabled = true;
      setInstallSteps(["Safari 하단 공유 버튼을 누른다.", "\"홈 화면에 추가\"를 누른다.", "추가를 누른다."]);
    } else {
      installMessage.textContent = "Chrome/Edge에서 설치 조건이 충족되면 이 버튼으로 추가할 수 있다.";
      installButton.disabled = true;
      installButton.textContent = "설치 준비 중";
      setInstallSteps(["버튼이 활성화되지 않으면 브라우저 메뉴를 연다.", "\"앱 설치\" 또는 \"홈 화면에 추가\"를 누른다."]);
    }

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton.disabled = false;
      installButton.textContent = "홈화면에 추가";
      installMessage.textContent = "설치할 준비가 됐다.";
    });

    installButton.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        return;
      }

      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.disabled = true;
      installButton.textContent = "추가 요청 완료";
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
